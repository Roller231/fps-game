services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: game_db
      MYSQL_USER: game_user
      MYSQL_PASSWORD: game_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      BACKEND_MYSQL_HOST: mysql
      BACKEND_MYSQL_PORT: 3306
      BACKEND_MYSQL_USER: game_user
      BACKEND_MYSQL_PASSWORD: game_pass
      BACKEND_MYSQL_DB: game_db
      BACKEND_SECRET_KEY: change_me
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app

  webgl:
    build:
      context: .
      dockerfile: backend/Dockerfile.webgl
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./Build:/usr/share/nginx/html:ro

volumes:
  mysql_data:
