services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: ${BACKEND_MYSQL_DB}
      MYSQL_USER: ${BACKEND_MYSQL_USER}
      MYSQL_PASSWORD: ${BACKEND_MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      BACKEND_MYSQL_HOST: ${BACKEND_MYSQL_HOST}
      BACKEND_MYSQL_PORT: ${BACKEND_MYSQL_PORT}
      BACKEND_MYSQL_USER: ${BACKEND_MYSQL_USER}
      BACKEND_MYSQL_PASSWORD: ${BACKEND_MYSQL_PASSWORD}
      BACKEND_MYSQL_DB: ${BACKEND_MYSQL_DB}
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      SERVER_HOST: ${SERVER_HOST}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads_data:/app/app/uploads
    restart: unless-stopped

  webgl:
    build:
      context: .
      dockerfile: backend/Dockerfile.webgl
    environment:
      SERVER_HOST: ${SERVER_HOST}
    depends_on:
      - backend
    ports:
      - "${WEBGL_PORT}:80"
    volumes:
      - ./Build:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
