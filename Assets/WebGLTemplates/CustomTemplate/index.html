<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | %UNITY_WEB_NAME%</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        body { padding: 0; margin: 0; }
        #unity-container { position: absolute; width: 100%; height: 100%; }
        #unity-canvas { background: #231F20; width: 100%; height: 100%; }
        #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
        #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; margin-left: 6.5px; background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; }
        #unity-progress-bar-full { width: 0%; height: 18px; margin-top: 10px; background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; }
        #unity-footer { position: relative; }
        .unity-mobile #unity-footer { display: none; }
        #unity-webgl-logo { float:left; width: 204px; height: 38px; background: url('TemplateData/webgl-logo.png') no-repeat center; }
        #unity-build-title { float: right; margin-right: 10px; line-height: 38px; font-family: arial; font-size: 18px; }
        #unity-fullscreen-button { float: right; width: 38px; height: 38px; background: url('TemplateData/fullscreen-button.png') no-repeat center; }
        #unity-warning { position: absolute; left: 50%; top: 5%; transform: translate(-50%); background: white; padding: 10px; display: none; }
    </style>
</head>
<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=%UNITY_WIDTH% height=%UNITY_HEIGHT% tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">
            <div id="unity-webgl-logo"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">%UNITY_WEB_NAME%</div>
        </div>
    </div>
    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");

        // Override console to hide warnings but keep errors
        var originalWarn = console.warn;
        var originalError = console.error;
        
        console.warn = function() {
            // Suppress all warnings
        };
        
        console.error = function() {
            // Keep errors visible
            originalError.apply(console, arguments);
        };

        function unityShowBanner(msg, type) {
            // Only show errors, not warnings
            if (type === 'error') {
                warningBanner.innerHTML = msg;
                warningBanner.style.display = 'block';
            }
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/%UNITY_WEBGL_LOADER_GLUE_FILENAME%";
        var config = {
            dataUrl: buildUrl + "/%UNITY_WEBGL_BUILD_DATA_FILENAME%",
            frameworkUrl: buildUrl + "/%UNITY_WEBGL_BUILD_FRAMEWORK_FILENAME%",
            codeUrl: buildUrl + "/%UNITY_WEBGL_BUILD_CODE_FILENAME%",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "%UNITY_COMPANY_NAME%",
            productName: "%UNITY_PRODUCT_NAME%",
            productVersion: "%UNITY_VERSION%",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            canvas.style.width = "%UNITY_WIDTH%px";
            canvas.style.height = "%UNITY_HEIGHT%px";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                };
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
