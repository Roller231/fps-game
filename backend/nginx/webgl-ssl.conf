# HTTP redirect to HTTPS
server {
    listen 80;
    server_name fpsmilitarygame.online www.fpsmilitarygame.online;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server for WebGL game
server {
    listen 443 ssl http2;
    server_name fpsmilitarygame.online www.fpsmilitarygame.online;

    ssl_certificate /etc/letsencrypt/live/fpsmilitarygame.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fpsmilitarygame.online/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle .wasm.br files - Brotli works over HTTPS
    location ~ \.wasm\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
        add_header Content-Type application/wasm;
    }

    # Handle .data.br files
    location ~ \.data\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
        add_header Content-Type application/octet-stream;
    }

    # Handle .js.br files
    location ~ \.js\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
        add_header Content-Type application/javascript;
    }

    # Handle .wasm.gz files
    location ~ \.wasm\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/wasm;
    }

    # Handle .data.gz files
    location ~ \.data\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/octet-stream;
    }

    # Handle .js.gz files
    location ~ \.js\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/javascript;
    }

    location ~* \.(data|wasm|js|symbols\.json)$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
    }

    location /Build/ {
        add_header Access-Control-Allow-Origin *;
    }
}
