map $request_method $backend_method {
    HEAD GET;
    default $request_method;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name fpsmilitarygame.online www.fpsmilitarygame.online;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server for landing + game
server {
    listen 443 ssl http2;
    server_name fpsmilitarygame.online www.fpsmilitarygame.online;

    ssl_certificate /etc/letsencrypt/live/fpsmilitarygame.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fpsmilitarygame.online/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;
    gzip_min_length 256;

    # Redirect /game to /game/
    location = /game {
        return 301 /game/;
    }

    # Serve Unity WebGL build under /game
    location /game/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # Landing page & API proxy
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_method $backend_method;
    }

    # Handle .wasm.br files - Brotli works over HTTPS
    location ~ ^/game/(.+)\.wasm\.br$ {
        alias /usr/share/nginx/html/$1.wasm.br;
        default_type application/wasm;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
    }

    # Handle .data.br files
    location ~ ^/game/(.+)\.data\.br$ {
        alias /usr/share/nginx/html/$1.data.br;
        default_type application/octet-stream;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
    }

    # Handle .js.br files
    location ~ ^/game/(.+)\.js\.br$ {
        alias /usr/share/nginx/html/$1.js.br;
        default_type application/javascript;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
    }

    # Handle .wasm.gz files
    location ~ ^/game/(.+)\.wasm\.gz$ {
        alias /usr/share/nginx/html/$1.wasm.gz;
        default_type application/wasm;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
    }

    # Handle .data.gz files
    location ~ ^/game/(.+)\.data\.gz$ {
        alias /usr/share/nginx/html/$1.data.gz;
        default_type application/octet-stream;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
    }

    # Handle .js.gz files
    location ~ ^/game/(.+)\.js\.gz$ {
        alias /usr/share/nginx/html/$1.js.gz;
        default_type application/javascript;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
    }

    location ~* ^/game/(.+)\.(data|wasm|js|symbols\.json)$ {
        alias /usr/share/nginx/html/$1.$2;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
    }
}
