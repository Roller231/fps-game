map $request_method $backend_method {
    HEAD GET;
    default $request_method;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    types {
        application/wasm wasm wasm.br;
        application/javascript js js.br;
        application/octet-stream data data.br;
        application/json json symbols.json symbols.json.br;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;
    gzip_min_length 256;

    # Redirect /game to /game/
    location = /game {
        return 301 /game/;
    }

    # Serve Unity WebGL build under /game
    location /game/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # Landing page & API proxy
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_method $backend_method;
    }

    # Handle .wasm.br files - serve as-is, Unity loader handles decompression
    location ~ ^/game/(.+)\.wasm\.br$ {
        alias /usr/share/nginx/html/$1.wasm.br;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
    }

    # Handle .data.br files
    location ~ ^/game/(.+)\.data\.br$ {
        alias /usr/share/nginx/html/$1.data.br;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
    }

    # Handle .js.br files
    location ~ ^/game/(.+)\.js\.br$ {
        alias /usr/share/nginx/html/$1.js.br;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
    }

    # Handle .json.br files
    location ~ ^/game/(.+)\.symbols\.json\.br$ {
        alias /usr/share/nginx/html/$1.symbols.json.br;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
        add_header Content-Type application/json;
    }

    # Handle .wasm.gz files
    location ~ ^/game/(.+)\.wasm\.gz$ {
        alias /usr/share/nginx/html/$1.wasm.gz;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/wasm;
    }

    # Handle .data.gz files
    location ~ ^/game/(.+)\.data\.gz$ {
        alias /usr/share/nginx/html/$1.data.gz;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/octet-stream;
    }

    # Handle .js.gz files
    location ~ ^/game/(.+)\.js\.gz$ {
        alias /usr/share/nginx/html/$1.js.gz;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/javascript;
    }

    location ~* ^/game/(.+)\.(data|wasm|js|symbols\.json)$ {
        alias /usr/share/nginx/html/$1.$2;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
    }
}
