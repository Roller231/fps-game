server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle .wasm.br files - serve as-is, Unity loader handles decompression
    location ~ ^(.+)\.wasm\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
        try_files $uri =404;
    }

    # Handle .data.br files
    location ~ ^(.+)\.data\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
        try_files $uri =404;
    }

    # Handle .js.br files
    location ~ ^(.+)\.js\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Type application/octet-stream;
        try_files $uri =404;
    }

    # Handle .json.br files
    location ~ ^(.+)\.symbols\.json\.br$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding br;
        add_header Content-Type application/json;
        try_files $uri $1.symbols.json =404;
    }

    # Handle .wasm.gz files
    location ~ ^(.+)\.wasm\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/wasm;
        try_files $uri $1.wasm =404;
    }

    # Handle .data.gz files
    location ~ ^(.+)\.data\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/octet-stream;
        try_files $uri $1.data =404;
    }

    # Handle .js.gz files
    location ~ ^(.+)\.js\.gz$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        add_header Content-Encoding gzip;
        add_header Content-Type application/javascript;
        try_files $uri $1.js =404;
    }

    location ~* \.(data|wasm|js|symbols\.json)$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
    }

    location /Build/ {
        add_header Access-Control-Allow-Origin *;
    }
}
